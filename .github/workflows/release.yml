name: build-and-release

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Build release binaries
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package zip artifact
        shell: bash
        run: |
          set -euo pipefail
          package_root="dist/agent-status-cli-${{ matrix.target }}"
          mkdir -p "$package_root"
          cp "target/${{ matrix.target }}/release/agent-status-cli" "$package_root/"
          cp "target/${{ matrix.target }}/release/asc-codex" "$package_root/"
          cp "target/${{ matrix.target }}/release/asc-claude" "$package_root/"
          cp README.md README_CN.md "$package_root/"
          (
            cd dist
            zip -rq "agent-status-cli-${{ matrix.target }}.zip" "agent-status-cli-${{ matrix.target }}"
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-status-cli-${{ matrix.target }}
          path: dist/agent-status-cli-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: publish release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: agent-status-cli-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
