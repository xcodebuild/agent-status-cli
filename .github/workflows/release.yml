name: build-and-release

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Build release binaries
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package zip artifact
        shell: bash
        run: |
          set -euo pipefail
          package_root="dist/agent-status-cli-${{ matrix.target }}"
          mkdir -p "$package_root"
          cp "target/${{ matrix.target }}/release/agent-status-cli" "$package_root/"
          cp "target/${{ matrix.target }}/release/asc-codex" "$package_root/"
          cp "target/${{ matrix.target }}/release/asc-claude" "$package_root/"
          cp README.md README_CN.md "$package_root/"
          (
            cd dist
            zip -rq "agent-status-cli-${{ matrix.target }}.zip" "agent-status-cli-${{ matrix.target }}"
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-status-cli-${{ matrix.target }}
          path: dist/agent-status-cli-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: publish release assets
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: agent-status-cli-*
          merge-multiple: true

      - name: Point latest tag to current commit
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push --force origin refs/tags/latest

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "release_name=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
            echo "make_latest=false" >> "${GITHUB_OUTPUT}"
          else
            echo "tag_name=latest" >> "${GITHUB_OUTPUT}"
            echo "release_name=Latest build (${GITHUB_SHA::7})" >> "${GITHUB_OUTPUT}"
            echo "make_latest=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "target_commitish=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Verify packaged assets
        shell: bash
        run: |
          set -euo pipefail
          ls -l dist
          test -f dist/agent-status-cli-x86_64-unknown-linux-gnu.zip
          test -f dist/agent-status-cli-x86_64-apple-darwin.zip
          test -f dist/agent-status-cli-aarch64-apple-darwin.zip

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          target_commitish: ${{ steps.meta.outputs.target_commitish }}
          files: dist/*.zip
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: ${{ steps.meta.outputs.make_latest }}
